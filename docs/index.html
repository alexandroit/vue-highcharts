<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>@revivejs/vue-highcharts — Docs</title>
  <meta http-equiv="refresh" content="0; url=vue-3/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5fbff 0%, #eef4fb 55%, #fff7ee 100%);
      color: #102033;
    }

    .card {
      width: min(680px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 28px;
      border: 1px solid rgba(16, 32, 51, 0.1);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 20px 60px rgba(17, 55, 94, 0.14);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0 0 20px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .versions {
      display: grid;
      gap: 12px;
    }

    .ver {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(16, 32, 51, 0.1);
      background: #fff;
    }

    .latest {
      background: #102033;
      color: #fff;
    }

    span {
      opacity: 0.8;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>@revivejs/vue-highcharts</h1>
    <p>Select a Vue version to view the live documentation and examples.</p>
    <div class="versions">
      <a class="ver latest" href="vue-3/">Vue 3 <span>latest</span></a>
      <a class="ver" href="vue-2/">Vue 2 <span>2.7</span></a>
    </div>
  </div>
</body>
</html>
